name=FOTA-Client-ESP8266
version=1.0.0
author=NodeWave
maintainer=NodeWave <dev@nodewave.io>
sentence=Secure FOTA client for ESP8266 with retry, lifecycle callbacks, SHA-256 and ECDSA/RSA signature verification.
paragraph=Connects to a NodeWave FOTA platform backend to check for firmware updates, download and verify signed firmware (SHA-256 + ECDSA P-256 / RSA-SHA256 via mbedTLS), then flash via the Arduino Updater (Update.h). Uses BearSSL for TLS. Note: Ed25519 is not supported on ESP8266 — use ECDSA_P256 on your backend.
category=Communication
url=https://github.com/nodewave/fota
architectures=esp8266
includes=FotaClient.h
depends=ArduinoJson
