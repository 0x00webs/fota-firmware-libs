; PlatformIO configuration for FOTA-Client-ESP8266
; ──────────────────────────────────────────────────
; Supported targets:
;   esp8266_d1mini  — Wemos D1 Mini (ESP8266, 4 MB flash)  — DEFAULT
;   esp8266_nodemcu — NodeMCU v3 (ESP8266, 4 MB flash)
;
; Usage:
;   pio run -e esp8266_d1mini -t upload   # build + flash
;   pio device monitor                    # serial monitor
;
; Note: host-based unit tests are not available for ESP8266 with PlatformIO
;       native runner (mbedTLS is not available on host). Test on hardware.

[platformio]
src_dir = examples/BasicUpdate
lib_dir = .

[env]
framework = arduino

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

monitor_speed = 115200
lib_extra_dirs = .

; ── Shared ESP8266 base ───────────────────────────────────────────────────────
[esp8266_base]
platform = espressif8266
build_flags =
    -Wall
    -Wextra
    -Wno-unused-parameter
    -DCORE_DEBUG_LEVEL=3
    ; BearSSL buffer size — minimum for TLS 1.2 with a 2048-bit cert chain.
    ; Increase to 16384 if the server sends a large certificate chain.
    -DBEARSSL_SSL_BASIC
    ; Explicitly add the sketch source dir to the compiler include path so that
    ; FotaConfig.h's __has_include("FotaUserConfig.h") resolves correctly when
    ; compiling library .cpp files.  Without this flag, PlatformIO does not add
    ; src_dir to the library compilation environment automatically.
    -I${platformio.src_dir}

; ── Wemos D1 Mini (default) ───────────────────────────────────────────────────
[env:esp8266_d1mini]
extends       = esp8266_base
board         = d1_mini
upload_speed  = 921600
monitor_speed = 115200

; ── NodeMCU v2/v3 ─────────────────────────────────────────────────────────────
[env:esp8266_nodemcu]
extends       = esp8266_base
board         = nodemcuv2
upload_speed  = 921600
monitor_speed = 115200

; ── Generic ESP8266 / ESP-01 (1 MB flash) ────────────────────────────────────
[env:esp8266_generic]
extends       = esp8266_base
board         = esp01_1m
upload_speed  = 460800
monitor_speed = 115200
