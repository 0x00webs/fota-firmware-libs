name=FOTA-Client-ESP32
version=1.0.0
author=NodeWave
maintainer=NodeWave <dev@nodewave.io>
sentence=Secure FOTA client for ESP32 with retry, lifecycle callbacks, SHA-256 and ECDSA/ED25519/RSA signature verification.
paragraph=Connects to a NodeWave FOTA platform backend to check for firmware updates, download and verify signed firmware (SHA-256 + ECDSA P-256 / ED25519 / RSA-SHA256 via mbedTLS), then flash via esp_https_ota. v1.0.0 adds: configurable retry with back-off (FOTA_RETRY_COUNT/DELAY), lifecycle event callback (onEvent), auto-fetch of signing public key (FOTA_AUTO_FETCH_PUBLIC_KEY), optional auto-reboot (FOTA_REBOOT_ON_SUCCESS), and per-library log-level control (FOTA_LOG_LEVEL). Supports campaign-aware OTA with live progress reporting.
category=Communication
url=https://github.com/nodewave/fota
architectures=esp32,esp32s2,esp32s3,esp32c3,esp32c6,esp32h2,esp32c2
includes=FotaClient.h
depends=ArduinoJson
